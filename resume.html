<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav" aria-label="Primary">
        <a class="brand" href="./index.html">My portfolio</a>
        <button class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-nav">
          <span class="nav-toggle-bars" aria-hidden="true"></span>
        </button>
        <ul class="nav-links">
          <li><a href="./index.html">Portfolio</a></li>
          <li><a href="./about.html">About Me</a></li>
          <li><a class="is-active" href="./resume.html">Resume</a></li>
        </ul>
      </nav>
      <div id="mobile-nav" class="nav-mobile" hidden>
        <a class="nav-mobile-link" href="./index.html">Portfolio</a>
        <a class="nav-mobile-link" href="./about.html">About Me</a>
        <a class="nav-mobile-link is-active" href="./resume.html">Resume</a>
      </div>
      <div class="nav-backdrop" hidden aria-hidden="true"></div>
    </header>

    <main class="container">
      <section class="hero" aria-label="Resume">
        <h1>Resume</h1>
        <p class="muted">View or download my resume below.</p>
    
        <div class="resume-actions">
          <a class="btn" href="./assets/LIMJINGYANG.CV.pdf" target="_blank" rel="noopener">
            View Resume
          </a>
    
          <a class="btn btn-outline" href="./assets/LIMJINGYANG.CV.pdf" download>
            Download Resume
          </a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <small>© <span id="year">2026</span> YULIO YANG</small>
    </footer>

    <script>
      (function () {
        // Header offset for fixed header
        var header = document.querySelector(".site-header");
        function setHeaderOffset() {
          if (!header) return;
          document.documentElement.style.setProperty("--header-offset", header.offsetHeight + "px");
        }
        setHeaderOffset();
        window.addEventListener("resize", setHeaderOffset);

        // Smart sticky header
        var lastY = window.scrollY || 0;
        window.addEventListener(
          "scroll",
          function () {
            if (!header) return;
            var y = window.scrollY || 0;
            var goingDown = y > lastY;
            if (y < 80) {
              header.classList.remove("is-hidden");
            } else if (goingDown && y > 400) {
              header.classList.add("is-hidden");
            } else if (!goingDown) {
              header.classList.remove("is-hidden");
            }
            lastY = y;
          },
          { passive: true }
        );

        // Mobile nav drawer
        var navBtn = document.querySelector(".nav-toggle");
        var navPanel = document.getElementById("mobile-nav");
        var backdrop = document.querySelector(".nav-backdrop");
        function closeNav() {
          if (!navBtn || !navPanel) return;
          navPanel.setAttribute("hidden", "");
          if (backdrop) backdrop.setAttribute("hidden", "");
          navBtn.setAttribute("aria-expanded", "false");
          navBtn.setAttribute("aria-label", "Open menu");
          document.documentElement.classList.remove("nav-open");
        }
        function openNav() {
          if (!navBtn || !navPanel) return;
          navPanel.removeAttribute("hidden");
          if (backdrop) backdrop.removeAttribute("hidden");
          navBtn.setAttribute("aria-expanded", "true");
          navBtn.setAttribute("aria-label", "Close menu");
          document.documentElement.classList.add("nav-open");
        }
        if (navBtn && navPanel) {
          navBtn.addEventListener("click", function () {
            var willOpen = navPanel.hasAttribute("hidden");
            if (willOpen) openNav();
            else closeNav();
          });
        }
        if (backdrop) backdrop.addEventListener("click", closeNav);
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") closeNav();
        });
      })();
    </script>

  </body>
</html>
